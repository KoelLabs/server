# fly.toml app configuration file generated for koel-server on 2026-02-01T01:49:32-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'koel-server'
primary_region = 'sjc'

[build]
  dockerfile = 'scripts/Dockerfile.prod'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '4gb'
  cpu_kind = 'performance'
  cpus = 1

[mounts]
  source = "modelweights"
  destination = "/app/.cache/huggingface/hub"
